name: Release

# Publica um instalador Velopack nas GitHub Releases ao criar uma tag v*.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Versão a partir da tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 1) Build do Angular e cópia para o wwwroot do host
      - name: Build Angular
        working-directory: src/web
        run: |
          npm ci
          npm run build
      - name: Copiar dist para wwwroot
        shell: bash
        run: |
          rm -rf src/Desktop/wwwroot
          mkdir -p src/Desktop/wwwroot
          cp -r src/web/dist/web/browser/* src/Desktop/wwwroot/

      # 2) Publish self-contained do host .NET
      - name: dotnet publish
        run: dotnet publish src/Desktop/Desktop.csproj -c Release -r win-x64 --self-contained -o publish /p:Version=${{ steps.ver.outputs.version }}

      # 3) Empacotar e enviar com Velopack
      - name: Instalar vpk
        run: dotnet tool install -g vpk
      - name: Empacotar (Velopack)
        run: vpk pack --packId GPT-APP --packVersion ${{ steps.ver.outputs.version }} --packDir publish --mainExe Desktop.exe --packTitle "GPT-APP" --icon src/Desktop/app.ico
      - name: Publicar na Release
        run: vpk upload github --repoUrl https://github.com/${{ github.repository }} --publish --releaseName "GPT-APP ${{ github.ref_name }}" --tag ${{ github.ref_name }} --token ${{ secrets.GITHUB_TOKEN }}
