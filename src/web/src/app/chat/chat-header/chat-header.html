<header class="chat-header">
  <div class="title">
    <i class="pi pi-sparkles"></i>
    <span>GPT-APP</span>
  </div>

  <p-button
    [icon]="mode() === 'dark' ? 'pi pi-sun' : 'pi pi-moon'"
    severity="secondary"
    [rounded]="true"
    [text]="true"
    [pTooltip]="mode() === 'dark' ? 'Tema claro' : 'Tema escuro'"
    tooltipPosition="left"
    (onClick)="toggleTheme()"
  />
</header>
